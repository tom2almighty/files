---
vif_only: true
ipv6: false
block_quic: true

hijack_dns:
  - '*:53'

geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

proxy_latency_test_url: http://1.1.1.1/generate_204
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204

dns:
  bootstrap:
    - system
  upstreams:
    Domestic-DNS:
      - 223.5.5.5
      - 119.29.29.29
  forward:
    - domain_wildcard:
        match: "*"
        value: Domestic-DNS
  hosts:
    iosapps.itunes.apple.com:
      - iosapps.itunes.apple.com.download.ks-cdn.com

policy_groups:
  - auto_test:
      name: Proxy
      policies:
        - Nodes
      flatten: true
      interval: 0
      tolerance: 0
      timeout: 3
      hidden: false
      icon: https://raw.githubusercontent.com/cc63/ICON/main/icons/Surge.png

  - select:
      name: Emby
      policies:
        - DIRECT
        - Proxy
        - Nodes
      flatten: true
      hidden: false
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png

  - external:
      name: Nodes
      type: select
      urls:
        - xxx
      update_interval: 0
      hidden: false
      icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Star.png

  - select:
      name: Final
      policies:
        - Proxy
        - DIRECT
      icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

rules:
  - domain:
      match: app-site-association.cdn-apple.com
      policy: REJECT
      name: Safari 防跳转

  - rule_set:
      match: https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list
      policy: REJECT
      name: 秋风去广告

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf
      policy: REJECT
      name: PCDN & QUIC 拦截

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/reject-drop.conf
      policy: REJECT
      name: 广告拦截

  - rule_set:
      match: https://ruleset.skk.moe/List/domainset/apple_cdn.conf
      policy: DIRECT
      name: Apple CDN

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/apple_cn.conf
      policy: DIRECT
      name: Apple CN

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/apple_services.conf
      policy: DIRECT
      name: Apple Service

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/microsoft_cdn.conf
      policy: DIRECT
      name: Microsoft CDN

  - rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/google.txt
      policy: DIRECT
      name: Google CN

  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Spotify/Spotify.list
      policy: DIRECT
      name: Spotify

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/ai.conf
      policy: Proxy
      name: AIGC

  - domain:
      match: line.xmsl.org
      policy: Proxy

  - rule_set:
      match: https://raw.githubusercontent.com/tom2almighty/files/refs/heads/main/surge/rules/emby.list
      policy: Emby
      name: Emby

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/telegram.conf
      policy: Proxy
      name: Telegram 域名

  - rule_set:
      match: https://ruleset.skk.moe/List/domainset/cdn.conf
      policy: Proxy
      name: CDN DomainSet

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/cdn.conf
      policy: Proxy
      name: CDN

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/global.conf
      policy: Proxy
      name: 国外域名

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/domestic.conf
      policy: DIRECT
      name: 国内网站

  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/lan.conf
      policy: DIRECT
      name: LAN

  - rule_set:
      match: https://ruleset.skk.moe/List/ip/reject.conf
      policy: REJECT
      name: IP 拦截

  - asn:
      match: "31898"
      policy: Proxy
      no_resolve: true
      name: 甲骨文

  - rule_set:
      match: https://ruleset.skk.moe/List/ip/telegram.conf
      policy: Proxy
      name: Telegram IP

  - rule_set:
      match: https://ruleset.skk.moe/List/ip/domestic.conf
      policy: DIRECT

  - rule_set:
      match: https://ruleset.skk.moe/List/ip/china_ip.conf
      policy: DIRECT
      name: 国内 IP

  - rule_set:
      match: https://ruleset.skk.moe/List/ip/china_ip_ipv6.conf
      policy: DIRECT
      name: 国内 IPv6

  - default:
      policy: Final
