[General]
loglevel = notify
all-hybrid = false

ipv6 = false
ipv6-vif = disabled

test-timeout = 3
internet-test-url = http://wifi.vivo.com.cn/generate_204
proxy-test-url = http://1.1.1.1/generate_204
proxy-test-udp = www.apple.com@64.6.64.6

udp-priority = false
udp-policy-not-supported-behaviour = REJECT

geoip-maxmind-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb

# 允许 Wi-Fi 访问 (仅 iOS，若允许远程访问将「false」改为「true」)
allow-wifi-access = false
allow-hotspot-access = false
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153


exclude-simple-hostnames = true
dns-server = 119.29.29.29, 223.5.5.5
read-etc-hosts = true

hijack-dns = *:53
show-error-page-for-reject = true
block-quic=all

[Proxy Group]
Proxy = smart, include-all-proxies=1, no-alert=0, hidden=0, icon-url=https://raw.githubusercontent.com/cc63/ICON/main/icons/Surge.png, update-interval=0, include-other-group=Nodes
Emby = select, DIRECT, Proxy, no-alert=0, hidden=0, include-all-proxies=1, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png, include-other-group=Nodes
Nodes = select, policy-path=xxx, update-interval=0, no-alert=0, hidden=0, include-all-proxies=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Star.png


[Rule]
DOMAIN,app-site-association.cdn-apple.com,REJECT // Safari 防跳转
RULE-SET,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list,REJECT,pre-matching,extended-matching // 秋风去广告
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf,REJECT-NO-DROP,extended-matching // PCDN & QUIC 拦截
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-drop.conf,REJECT-DROP,pre-matching // 广告拦截


RULE-SET,SYSTEM,DIRECT
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/apple_cdn.conf,DIRECT,extended-matching // Apple CDN
RULE-SET,https://ruleset.skk.moe/List/non_ip/apple_cn.conf,DIRECT // Apple CN
RULE-SET,https://ruleset.skk.moe/List/non_ip/apple_services.conf,DIRECT // Apple Service
RULE-SET,https://ruleset.skk.moe/List/non_ip/microsoft_cdn.conf,DIRECT // Microsoft CDN
DOMAIN-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/google.txt,DIRECT // Google CN
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Spotify/Spotify.list,DIRECT,extended-matching // Spotify

RULE-SET,https://ruleset.skk.moe/List/non_ip/ai.conf,Proxy,extended-matching // AIGC

DOMAIN,line.xmsl.org,Proxy
RULE-SET,https://raw.githubusercontent.com/tom2almighty/files/refs/heads/main/Surge/Rules/Emby.list,Emby // Emby

# 代理
RULE-SET,https://ruleset.skk.moe/List/non_ip/telegram.conf,Proxy // Telegram 域名
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/cdn.conf,Proxy // CDN
RULE-SET,https://ruleset.skk.moe/List/non_ip/cdn.conf,Proxy // CDN
RULE-SET,https://ruleset.skk.moe/List/non_ip/global.conf,Proxy,extended-matching // 国外域名
# 直连
RULE-SET,https://ruleset.skk.moe/List/non_ip/domestic.conf,DIRECT,extended-matching // 国内网站
RULE-SET,https://ruleset.skk.moe/List/non_ip/lan.conf,DIRECT // LAN
# IP 规则
RULE-SET,https://ruleset.skk.moe/List/ip/reject.conf,REJECT-DROP // IP 拦截
IP-ASN,31898,Proxy,no-resolve // 甲骨文
RULE-SET,https://ruleset.skk.moe/List/ip/telegram.conf,Proxy // Telegram IP
RULE-SET,https://ruleset.skk.moe/List/ip/domestic.conf,DIRECT
RULE-SET,https://ruleset.skk.moe/List/ip/china_ip.conf,DIRECT // 国内 IP
RULE-SET,https://ruleset.skk.moe/List/ip/china_ip_ipv6.conf,DIRECT // 国内IPv6
RULE-SET,LAN,DIRECT

FINAL,Final,dns-failed

[Host]
iosapps.itunes.apple.com = iosapps.itunes.apple.com.download.ks-cdn.com // App Store 下载请求解析 金山CDN

[MITM]

